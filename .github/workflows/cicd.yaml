name: CI-CD (EC2 self-hosted, ECR)

on:
  pull_request:
  push:
    branches: ["main"]

env:
  CONTAINER_NAME: rag-api
  APP_PORT: "8000"
  HOST_PORT: "8000"

jobs:
  ci:
    name: CI (docker build smoke)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (smoke)
        run: docker build -t rag-api:ci .

  cd:
    name: CD (push to ECR + deploy)
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + Push
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy (restart container)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e

          if [ "$(docker ps -aq -f name=^${CONTAINER_NAME}$)" ]; then
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
          fi

          docker pull "$IMAGE_URI"

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$HOST_PORT:$APP_PORT" \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            -e RAG_DATA_DIR="rag_store" \
            "$IMAGE_URI"

          docker ps --filter "name=$CONTAINER_NAME"